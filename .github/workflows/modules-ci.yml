name: Modules CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  discover:
    name: Discover modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.discover.outputs.modules }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover module directories
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t modules < <(
            for d in */ ; do
              [ -d "$d" ] || continue

              if [[ "$d" == ".github/" ]]; then continue; fi

              if find "$d" -maxdepth 1 -name "*.tf" | grep -q .; then
                basename "$d"
              fi
            done | sort
          )

          if [ "${#modules[@]}" -eq 0 ]; then
            echo 'modules=[]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          json=$(printf '%s\n' "${modules[@]}" | jq -R . | jq -s -c .)
          echo "modules=${json}" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate module - ${{ matrix.module }}
    needs: discover
    if: ${{ needs.discover.outputs.modules != '[]' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover.outputs.modules) }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.8

      - name: Set up Terraform (for TFLint)
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          pip install checkov

      - name: Check formatting
        run: tofu fmt -check -recursive "${{ matrix.module }}"

      - name: Init module
        working-directory: ${{ matrix.module }}
        run: tofu init -backend=false

      - name: Validate module
        working-directory: ${{ matrix.module }}
        run: tofu validate

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint
        working-directory: ${{ matrix.module }}
        run: tflint

      - name: Validate basic example
        if: ${{ hashFiles(format('{0}/examples/basic/*.tf', matrix.module)) != '' }}
        working-directory: ${{ matrix.module }}/examples/basic
        run: |
          tofu init -backend=false
          tofu validate

      - name: Run Checkov
        run: |
          SKIP_CHECKS=""
          if [[ "${{ matrix.module }}" == "s3" ]]; then
            SKIP_CHECKS="CKV_AWS_144,CKV2_AWS_62"
          elif [[ "${{ matrix.module }}" == "security_group" ]]; then
            SKIP_CHECKS="CKV2_AWS_5"
          fi

          if [[ -n "$SKIP_CHECKS" ]]; then
            checkov -d "${{ matrix.module }}" --quiet --skip-check "$SKIP_CHECKS"
          else
            checkov -d "${{ matrix.module }}" --quiet
          fi

  docs:
    name: Generate docs - ${{ matrix.module }}
    needs: discover
    if: ${{ needs.discover.outputs.modules != '[]' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover.outputs.modules) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install terraform-docs
        shell: bash
        run: |
          set -euo pipefail
          VERSION="0.17.0"
          curl -sSLo terraform-docs.tar.gz \
            "https://github.com/terraform-docs/terraform-docs/releases/download/v${VERSION}/terraform-docs-v${VERSION}-linux-amd64.tar.gz"
          tar -xzf terraform-docs.tar.gz terraform-docs
          chmod +x terraform-docs
          sudo mv terraform-docs /usr/local/bin/terraform-docs
          terraform-docs --version

      - name: Generate module README
        shell: bash
        run: |
          set -euo pipefail
          terraform-docs markdown table \
            --config .terraform-docs.yml \
            --output-file README.md \
            --output-mode inject \
            "${{ matrix.module }}"

      - name: Commit and push README changes
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ matrix.module }}/README.md"

          if git diff --cached --quiet; then
            echo "No README changes for ${{ matrix.module }}"
            exit 0
          fi

          git commit -m "docs(terraform): update README for ${{ matrix.module }}"

          success=false
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              success=true
              break
            fi
            echo "Push attempt $i failed, retrying..."
            sleep $(( i * 2 ))
          done

          if [[ "$success" != "true" ]]; then
            echo "Failed to push README changes after multiple attempts."
            exit 1
          fi

      - name: Upload module README artifact
        uses: actions/upload-artifact@v4
        with:
          name: readme-${{ matrix.module }}
          path: ${{ matrix.module }}/README.md

  combined-readme:
    name: Generate combined README
    needs: [discover, docs]
    if: ${{ needs.discover.outputs.modules != '[]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download module README artifacts
        uses: actions/download-artifact@v4
        with:
          path: module-readmes

      - name: Build combined README
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "# Terraform / OpenTofu AWS Modules"
            echo
            echo "This repository contains reusable, production-grade Terraform / OpenTofu modules."
            echo
            echo
            echo "## Available Modules"
            echo
          } > README.generated.md

          for d in module-readmes/readme-*; do
            [ -d "$d" ] || continue
            module="$(basename "$d" | sed 's/^readme-//')"
            echo "- \`${module}\`" >> README.generated.md
          done

          {
            echo
            echo "---"
            echo
            echo "## Combined Module Documentation"
            echo
          } >> README.generated.md

          for d in module-readmes/readme-*; do
            [ -d "$d" ] || continue
            module="$(basename "$d" | sed 's/^readme-//')"
            file="$d/README.md"

            {
              echo "### ${module}"
              echo
              cat "$file"
              echo
              echo "---"
              echo
            } >> README.generated.md
          done

      - name: Upload combined README artifact
        uses: actions/upload-artifact@v4
        with:
          name: combined-readme
          path: README.generated.md

  repo-fmt:
    name: Repo format check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.8

      - name: Check repository formatting
        run: tofu fmt -check -recursive .